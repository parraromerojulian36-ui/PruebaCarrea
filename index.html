<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Carrera de Observación - ADSO</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script type="module" src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-location-only.mjs"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        /* UI: Mapa */
        #map { position: absolute; top: 10px; left: 10px; width: 35%; height: 25%; z-index: 1000; border: 2px solid white; border-radius: 10px; }
        /* UI: Contador de distancia */
        #distancia { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; z-index: 1000; font-family: sans-serif; border-radius: 5px; }
    </style>
</head>

<body>

    <div id="map"></div>
    <div id="distancia">Calculando...</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-entity light="type: hemisphere; color: #ffffff; groundColor: #ffffff; intensity: 3.0"></a-entity>
        <a-entity light="type: ambient; intensity: 1.5"></a-entity>

        <a-camera gps-camera rotation-reader>
            <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactuable"></a-entity>
        </a-camera>

        <a-gltf-model 
            src="cofre.glb" 
            class="interactuable"
            scale="2 2 2" 
            gps-entity-place="latitude: 4.3080264605938385; longitude: -74.29889583728055"
            onclick="abrirCofre()">
        </a-gltf-model>
    </a-scene>

    <script>
        // Coordenadas del Cofre
        const targetLat = 4.3080264605938385;
        const targetLon = -74.29889583728055;

        // --- Lógica del Mapa ---
        const map = L.map('map').setView([targetLat, targetLon], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([targetLat, targetLon]).addTo(map).bindPopup("¡Cofre aquí!");

        // --- Lógica de Distancia ---
        navigator.geolocation.watchPosition((position) => {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;
            
            // Cálculo simple de distancia en metros
            const R = 6371000; 
            const dLat = (targetLat - userLat) * Math.PI / 180;
            const dLon = (targetLon - userLon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userLat * Math.PI/180) * Math.cos(targetLat * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distancia = Math.round(R * c);

            document.getElementById('distancia').innerText = "Distancia: " + distancia + " m";
        });

        // --- Lógica de Interacción ---
        function abrirCofre() {
            alert("¡FELICITACIONES! Has encontrado el tesoro. El código del reto es: ADSO-2026");
        }
    </script>
</body>
</html>
