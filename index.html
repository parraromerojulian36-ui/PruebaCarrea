<a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>

    <a-entity id="punto-interes" 
              class="clickable"
              gps-entity-place="latitude: 4.2811; longitude: -74.3642;"
              data-info="¡Encontraste el cofre! Contiene: 100 puntos.">
        
        <a-entity id="beacon">
            <a-cylinder color="#00FFFF" height="300" radius="0.5" 
                        material="opacity: 0.6; transparent: true; shader: flat;" 
                        position="0 150 0"></a-cylinder>
            <a-ring color="#00FFFF" radius-inner="0.5" radius-outer="2" 
                    rotation="-90 0 0" material="opacity: 0.9; transparent: true;"></a-ring>
        </a-entity>

        <a-box id="objeto-interactivo" 
               color="#FF4444" scale="3 3 3" position="0 1.5 0" 
               visible="false"></a-box>
    </a-entity>

    <a-camera gps-camera rotation-reader></a-camera>
</a-scene>

<script>
    // Configuración del juego
    const DISTANCIA_ACTIVACION = 15; // 15 metros
    const puntoInteres = document.getElementById('punto-interes');
    const beacon = document.getElementById('beacon');
    const cofre = document.getElementById('objeto-interactivo');

    // Función Haversine para calcular distancia
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // Bucle de comprobación
    setInterval(() => {
        // Obtenemos la posición actual del usuario desde el gps-camera
        const camera = document.querySelector('a-camera').components['gps-camera'];
        const userPos = camera.currentCoords; // Coordenadas del usuario
        
        if (userPos) {
            // Obtenemos las coordenadas del punto de interés
            // Nota: gps-entity-place no actualiza atributos de objeto, 
            // así que deberías guardar las coordenadas en variables JS para comparación
            const targetLat = 4.2811;
            const targetLon = -74.3642;

            const dist = calcularDistancia(userPos.latitude, userPos.longitude, targetLat, targetLon);

            // Lógica de visibilidad
            if (dist < DISTANCIA_ACTIVACION) {
                // Estamos cerca: Ocultar rayo, mostrar objeto
                beacon.setAttribute('visible', 'false');
                cofre.setAttribute('visible', 'true');
            } else {
                // Estamos lejos: Mostrar rayo, ocultar objeto
                beacon.setAttribute('visible', 'true');
                cofre.setAttribute('visible', 'false');
            }
        }
    }, 2000); // Se ejecuta cada 2000ms (2 segundos)
</script>
