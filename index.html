<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR GPS con Mapa y Distancia</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-location-only.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Capa para el mapa */
        #map { position: absolute; top: 10px; left: 10px; width: 30%; height: 20%; z-index: 1000; border: 2px solid white; border-radius: 10px; }
        /* Capa para el texto de distancia */
        #distancia { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 10px; z-index: 1000; font-family: sans-serif; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="map"></div>
    <div id="distancia">Cargando ubicación...</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-camera gps-camera rotation-reader></a-camera>
        <a-gltf-model src="cofre.glb" scale="2 2 2" gps-entity-place="latitude: 4.6097; longitude: -74.0817"></a-gltf-model>
    </a-scene>

    <script>
        // Coordenadas de tu Cofre
        const targetLat = 4.6097;
        const targetLon = -74.0817;

        // Inicializar Mapa
        const map = L.map('map').setView([targetLat, targetLon], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([targetLat, targetLon]).addTo(map).bindPopup("¡Aquí está el Cofre!");

        // Calcular distancia
        navigator.geolocation.watchPosition((position) => {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;
            
            // Fórmula básica de distancia (aproximada en metros)
            const R = 6371000; // Radio de la tierra en metros
            const dLat = (targetLat - userLat) * Math.PI / 180;
            const dLon = (targetLon - userLon) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userLat * Math.PI/180) * Math.cos(targetLat * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distancia = Math.round(R * c);

            document.getElementById('distancia').innerText = "Distancia al objetivo: " + distancia + " metros";
        });
    </script>
</body>
</html>
